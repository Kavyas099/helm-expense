kind: Deployment
apiVersion: apps/v1
metadata:
  name: frontend
  namespace: expense
  labels:
    project: expense
    tier: frontend
spec:
  replicas: {{ .Values.deployment.replicas}}
  selector:
    matchLabels: 
      project: expense
      tier: frontend
  template:
    metadata:
      labels:
        project: expense
        tier: frontend
    spec:
      containers:
      - name: nginx
        image: {{ .Values.deployment.version}}