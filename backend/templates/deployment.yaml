kind: Deployment
apiVersion: apps/v1
metadata:
  name: backend
  namespace: expense
  labels:
    project: expense
    tier: backend
spec:
  replicas: {{ .values.deployment.replicas }}
  selector:
    matchLabels:
      project: expense
      tier: backend
  template:
    metadata:
      labels:
        project: expense
        tier: backend
    containers:
    - name: nginx
      image: {{ .values.deployment.version}}
      envFrom:
        - configMapRef:
            name: backend
