
kind: StatefulSet
apiVersion: apps/v1
metadata:
  name: mysql
  namespace: expense
  labels:
    project: expense
    tier: mysql
    folder: helm
spec:
  selector:
    matchLabels:
      project: expense
      tier: mysql
      folder: helm
  serviceName: "mysql-headless"
  replicas: {{ .values.statefulset.replicas }}# by default is 1
  
  template:
    metadata:
      labels:
     
        project: expense
        tier: mysql
        folder: helm # has to match .spec.selector.matchLabels
    spec:
    
      containers:
      - name: mysql
        image: {{ .values.statefulset.version}}
        volumeMounts:
        - name: mysql
          mountPath: /var/lib/mysql
  # Instead of creating a PVC resource, you can directly provide in statefulset
  volumeClaimTemplates:
  - metadata:
      name: mysql
      namespace: expense
    spec:
      accessModes: [ "ReadWriteOnce" ]
      storageClassName: "ebs-sc"
      resources:
        requests:
          storage: {{   .values.statefulset.storage }}